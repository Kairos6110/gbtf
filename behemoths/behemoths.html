<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behemoths Map</title>
    <style>
        body {
            background-color: #1e261e;
            color: #a3bfa3;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            font-size: 1.8rem;
            border-bottom: 2px solid #4a5e4a;
            display: inline-block;
            padding-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #000;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .tip-text {
            color: #ffffff;
            font-size: 0.85rem;
            margin-top: 0;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .progress-text {
            color: #ffffff;
            font-size: 0.85rem;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .map-container {
            position: relative;
            display: inline-block;
            width: min(910px, 100%);
            aspect-ratio: 5135 / 4706;
            overflow: hidden;
            border: 5px solid #0f140f;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: grab;
            touch-action: none;
            --map-zoom: 1;
        }

        @media (max-width: 700px) {
            .map-container {
                aspect-ratio: auto;
                height: 75vh;
                width: 100%;
            }
        }

        .map-container.is-panning {
            cursor: grabbing;
        }

        #map-content {
            position: absolute;
            width: 910px;
            height: 834px;
            transform-origin: 0 0;
        }

        #main-map {
            display: block;
            width: 100%;
            height: 100%;
            max-width: none;
            pointer-events: none;
        }

        .map-marker {
            position: absolute;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 2px solid transparent;
            border-radius: 50%;
            background: transparent;
            color: #ffffff;
            cursor: pointer;
            transform: translate(-50%, -50%) scale(var(--marker-scale));
            transform-origin: center;
        }

        .map-marker:hover,
        .map-marker:focus-visible {
            border-color: #ffffff;
            outline: none;
        }

        .map-marker.is-checked {
            border-color: #d7ffd7;
            background: rgba(24, 117, 45, 0.92);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.85);
        }

        .map-marker.is-checked::after {
            content: "✓";
            display: block;
            font-family: Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
            line-height: 26px;
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 1.2rem;
                letter-spacing: 1px;
                padding-bottom: 6px;
                margin-top: 5px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>Behemoths (25🔴) Map</h1>
    <p class="tip-text">CLICK MARKERS TO CHECK THEM OFF | DRAG TO PAN | SCROLL OR PINCH TO ZOOM</p>
    <p class="progress-text" id="progress-text">COMPLETED: 0 / 25</p>

    <div class="map-container" id="map-area">
        <div id="map-content">
            <img src="map25.jpg" alt="Operations Map" width="910" height="834" id="main-map">
        </div>
    </div>

    <script>
        const MIN_MAP_ZOOM = 0.1;
        const MAX_MAP_ZOOM = 4096;

        let mapZoom = 1;
        let mapPanX = 0;
        let mapPanY = 0;
        let panningMap = false;
        let panStartX = 0;
        let panStartY = 0;
        let panOriginX = 0;
        let panOriginY = 0;
        let activeMapPointers = new Map();
        let pinchStartDistance = 0;
        let pinchStartZoom = 1;
        let pinchMapAnchorX = 0;
        let pinchMapAnchorY = 0;
        const MARKER_STORAGE_KEY = 'behemoths-completed-markers';
        const markerPositions = [
            [831, 42], [770, 56], [781, 106], [516, 167], [440, 249],
            [549, 263], [314, 268], [211, 279], [468, 324], [428, 348],
            [289, 349], [230, 368], [274, 377], [354, 423], [154, 437],
            [339, 450], [182, 469], [231, 497], [207, 516], [129, 525],
            [179, 529], [321, 532], [295, 558], [179, 598], [154, 705]
        ];
        let completedMarkers = new Set();

        function loadCompletedMarkers() {
            try {
                const storedMarkers = JSON.parse(localStorage.getItem(MARKER_STORAGE_KEY) || '[]');

                if (Array.isArray(storedMarkers)) {
                    completedMarkers = new Set(storedMarkers.filter(function(markerId) {
                        return Number.isInteger(markerId) && markerId >= 0 && markerId < markerPositions.length;
                    }));
                }
            } catch (error) {
                completedMarkers = new Set();
            }
        }

        function saveCompletedMarkers() {
            try {
                localStorage.setItem(MARKER_STORAGE_KEY, JSON.stringify(Array.from(completedMarkers)));
            } catch (error) {
                // Tracking still works for the current page when storage is unavailable.
            }
        }

        function updateProgress() {
            document.getElementById('progress-text').textContent =
                `COMPLETED: ${completedMarkers.size} / ${markerPositions.length}`;
        }

        function toggleMarker(markerId, markerButton) {
            if (completedMarkers.has(markerId)) {
                completedMarkers.delete(markerId);
            } else {
                completedMarkers.add(markerId);
            }

            const isChecked = completedMarkers.has(markerId);
            markerButton.classList.toggle('is-checked', isChecked);
            markerButton.setAttribute('aria-pressed', String(isChecked));
            saveCompletedMarkers();
            updateProgress();
        }

        function initMarkers() {
            const mapContent = document.getElementById('map-content');

            loadCompletedMarkers();

            markerPositions.forEach(function(position, markerId) {
                const markerButton = document.createElement('button');
                const isChecked = completedMarkers.has(markerId);

                markerButton.type = 'button';
                markerButton.className = `map-marker${isChecked ? ' is-checked' : ''}`;
                markerButton.style.left = `${position[0]}px`;
                markerButton.style.top = `${position[1]}px`;
                markerButton.setAttribute('aria-label', `Behemoth marker ${markerId + 1}`);
                markerButton.setAttribute('aria-pressed', String(isChecked));
                markerButton.addEventListener('pointerdown', function(event) {
                    event.stopPropagation();
                });
                markerButton.addEventListener('click', function() {
                    toggleMarker(markerId, markerButton);
                });
                mapContent.appendChild(markerButton);
            });

            updateProgress();
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function applyMapTransform() {
            const mapArea = document.getElementById('map-area');
            const mapContent = document.getElementById('map-content');

            mapArea.style.setProperty('--map-zoom', mapZoom);
            mapArea.style.setProperty('--marker-scale', 1 / mapZoom);
            mapContent.style.transform = `translate(${mapPanX}px, ${mapPanY}px) scale(${mapZoom})`;
        }

        function zoomMapAt(clientX, clientY, nextZoom) {
            const mapArea = document.getElementById('map-area');
            const rect = mapArea.getBoundingClientRect();
            const safeZoom = clamp(nextZoom, MIN_MAP_ZOOM, MAX_MAP_ZOOM);
            const anchorX = clientX - rect.left;
            const anchorY = clientY - rect.top;
            const mapX = (anchorX - mapPanX) / mapZoom;
            const mapY = (anchorY - mapPanY) / mapZoom;

            mapZoom = safeZoom;
            mapPanX = anchorX - (mapX * mapZoom);
            mapPanY = anchorY - (mapY * mapZoom);
            applyMapTransform();
        }

        function getPointerPair() {
            return Array.from(activeMapPointers.values()).slice(0, 2);
        }

        function getPointerDistance(first, second) {
            return Math.hypot(first.clientX - second.clientX, first.clientY - second.clientY);
        }

        function getPointerCenter(first, second) {
            return {
                clientX: (first.clientX + second.clientX) / 2,
                clientY: (first.clientY + second.clientY) / 2
            };
        }

        function beginPinchZoom() {
            const mapArea = document.getElementById('map-area');
            const rect = mapArea.getBoundingClientRect();
            const [first, second] = getPointerPair();
            const center = getPointerCenter(first, second);

            pinchStartDistance = getPointerDistance(first, second);
            pinchStartZoom = mapZoom;
            pinchMapAnchorX = (center.clientX - rect.left - mapPanX) / mapZoom;
            pinchMapAnchorY = (center.clientY - rect.top - mapPanY) / mapZoom;
            panningMap = false;
            mapArea.classList.remove('is-panning');
        }

        function updatePinchZoom() {
            const mapArea = document.getElementById('map-area');
            const rect = mapArea.getBoundingClientRect();
            const [first, second] = getPointerPair();
            const center = getPointerCenter(first, second);
            const distance = getPointerDistance(first, second);

            if (!pinchStartDistance) {
                return;
            }

            mapZoom = clamp(pinchStartZoom * (distance / pinchStartDistance), MIN_MAP_ZOOM, MAX_MAP_ZOOM);
            mapPanX = center.clientX - rect.left - (pinchMapAnchorX * mapZoom);
            mapPanY = center.clientY - rect.top - (pinchMapAnchorY * mapZoom);
            applyMapTransform();
        }

        function endMapPointer(event) {
            const mapArea = document.getElementById('map-area');

            activeMapPointers.delete(event.pointerId);

            if (mapArea.hasPointerCapture(event.pointerId)) {
                mapArea.releasePointerCapture(event.pointerId);
            }

            if (activeMapPointers.size < 2) {
                pinchStartDistance = 0;
            }

            if (activeMapPointers.size === 1) {
                const [remainingPointer] = Array.from(activeMapPointers.values());
                panningMap = true;
                panStartX = remainingPointer.clientX;
                panStartY = remainingPointer.clientY;
                panOriginX = mapPanX;
                panOriginY = mapPanY;
                mapArea.classList.add('is-panning');
                return;
            }

            panningMap = false;
            mapArea.classList.remove('is-panning');
        }

        function initMapZoom() {
            const mapArea = document.getElementById('map-area');

            mapArea.addEventListener('wheel', function(event) {
                event.preventDefault();
                const zoomFactor = Math.exp(-event.deltaY * 0.0015);
                zoomMapAt(event.clientX, event.clientY, mapZoom * zoomFactor);
            }, { passive: false });

            mapArea.addEventListener('pointerdown', function(event) {
                event.preventDefault();
                activeMapPointers.set(event.pointerId, {
                    clientX: event.clientX,
                    clientY: event.clientY
                });
                mapArea.setPointerCapture(event.pointerId);

                if (activeMapPointers.size >= 2) {
                    beginPinchZoom();
                    return;
                }

                panningMap = true;
                panStartX = event.clientX;
                panStartY = event.clientY;
                panOriginX = mapPanX;
                panOriginY = mapPanY;
                mapArea.classList.add('is-panning');
            });

            mapArea.addEventListener('pointermove', function(event) {
                if (activeMapPointers.has(event.pointerId)) {
                    activeMapPointers.set(event.pointerId, {
                        clientX: event.clientX,
                        clientY: event.clientY
                    });
                }

                if (activeMapPointers.size >= 2) {
                    event.preventDefault();
                    updatePinchZoom();
                    return;
                }

                if (!panningMap) {
                    return;
                }

                event.preventDefault();
                mapPanX = panOriginX + event.clientX - panStartX;
                mapPanY = panOriginY + event.clientY - panStartY;
                applyMapTransform();
            });

            mapArea.addEventListener('pointerup', function(event) {
                endMapPointer(event);
            });

            mapArea.addEventListener('pointercancel', function(event) {
                endMapPointer(event);
            });

            applyMapTransform();
        }

        window.onload = function() {
            initMarkers();
            initMapZoom();

            const mapArea = document.getElementById('map-area');
            const rect = mapArea.getBoundingClientRect();
            mapZoom = rect.width / 910;
            mapPanY = (rect.height - (834 * mapZoom)) / 2;
            applyMapTransform();
        };
    </script>
</body>
</html>
