<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080b09">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9F%3C/text%3E%3C/svg%3E">
  <title>HAVOC // GBTF TOC</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    :root {
      color-scheme: dark;
      --bg: #080b09;
      --panel: #101511;
      --panel-2: #151c17;
      --line: #29342b;
      --muted: #7e8c81;
      --text: #e7eee8;
      --green: #91f29f;
      --green-dim: #355f3b;
      --amber: #f4b860;
      --red: #ef6258;
      font-family: "IBM Plex Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }

    body {
      height: 100dvh;
      margin: 0;
      background:
        linear-gradient(rgba(145, 242, 159, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(145, 242, 159, .025) 1px, transparent 1px),
        radial-gradient(circle at 50% 0%, #152019 0, var(--bg) 52%);
      background-size: 28px 28px, 28px 28px, 100% 100%;
      color: var(--text);
      padding: 22px;
    }

    .shell {
      width: min(1080px, 100%);
      height: calc(100dvh - 44px);
      min-height: 0;
      margin: auto;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background: rgba(12, 16, 13, .94);
      border: 1px solid var(--line);
      box-shadow: 0 25px 80px #000a;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: #0c110d;
    }

    .brand { display: flex; align-items: center; gap: 15px; }

    .insignia {
      width: 46px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font: 700 1.4rem "Barlow Condensed", sans-serif;
      transform: rotate(45deg);
    }

    .insignia span { transform: rotate(-45deg); }

    h1 {
      margin: 0;
      font: 700 clamp(1.8rem, 4vw, 2.5rem)/.9 "Barlow Condensed", sans-serif;
      letter-spacing: .08em;
    }

    .kicker, .connection {
      color: var(--muted);
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .connection { display: flex; align-items: center; gap: 9px; color: var(--green); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 12px currentColor; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      min-height: 0;
      overflow: hidden;
    }

    .comms { display: grid; grid-template-rows: minmax(0, 1fr) auto; min-height: 0; overflow: hidden; }

    #log {
      min-height: 0;
      overflow-y: auto;
      padding: 30px;
      scroll-behavior: smooth;
    }

    .empty { color: var(--muted); margin-top: 80px; text-align: center; }
    .empty strong { display: block; color: #b5c1b7; font: 600 1.4rem "Barlow Condensed", sans-serif; letter-spacing: .08em; margin-bottom: 10px; }

    .message { max-width: 82%; margin-bottom: 24px; animation: appear .2s ease-out; }
    .message.operator { margin-left: auto; }
    .message-meta { margin-bottom: 7px; color: var(--muted); font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; }
    .operator .message-meta { text-align: right; }
    .message-body { padding: 14px 16px; border-left: 2px solid var(--green); background: var(--panel-2); line-height: 1.55; white-space: pre-wrap; }
    .operator .message-body { border: 1px solid #344038; border-left: 0; background: #111713; }

    @keyframes appear { from { opacity: 0; transform: translateY(6px); } }

    .transcript {
      padding: 20px 30px 26px;
      border-top: 1px solid var(--line);
      background: #0d120f;
    }

    #heard { min-height: 24px; margin-bottom: 13px; color: #aeb9b0; font-size: .85rem; }
    #heard.listening { color: var(--green); }

    .manual-row { display: flex; gap: 10px; }
    input {
      width: 100%;
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 2px;
      outline: none;
      background: #080c09;
      color: var(--text);
      font: inherit;
    }
    input:focus { border-color: var(--green-dim); box-shadow: 0 0 0 3px #91f29f10; }

    .send {
      padding: 0 19px;
      border: 1px solid var(--green-dim);
      background: #17261a;
      color: var(--green);
      font: 600 .72rem inherit;
      letter-spacing: .08em;
      cursor: pointer;
    }

    aside {
      padding: 26px 22px;
      border-left: 1px solid var(--line);
      background: #0b100c;
      overflow: hidden;
    }

    .section-label { margin: 0 0 9px; color: var(--muted); font-size: .65rem; letter-spacing: .16em; text-transform: uppercase; }
    .voice-control { margin-bottom: 25px; }
    .voice-control select {
      width: 100%;
      padding: 11px 34px 11px 12px;
      border: 1px solid var(--line);
      border-radius: 2px;
      outline: none;
      background: #080c09;
      color: #c6d1c8;
      font: 500 .7rem "IBM Plex Mono", monospace;
      cursor: pointer;
    }
    .voice-control select:focus { border-color: var(--green-dim); box-shadow: 0 0 0 3px #91f29f10; }
    .radio-status {
      min-height: 44px;
      margin-bottom: 18px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: .72rem;
      letter-spacing: .1em;
      text-align: center;
      text-transform: uppercase;
    }

    .ptt-row {
      --ptt-size: 190px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      width: var(--ptt-size);
      height: var(--ptt-size);
      margin: 0 auto 24px;
    }

    .radio-visual {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      border-radius: 50%;
      filter: drop-shadow(0 8px 7px #000c);
      user-select: none;
      pointer-events: none;
    }

    #ptt {
      position: relative;
      width: var(--ptt-size);
      height: var(--ptt-size);
      min-width: var(--ptt-size);
      min-height: var(--ptt-size);
      max-width: var(--ptt-size);
      max-height: var(--ptt-size);
      flex: 0 0 var(--ptt-size);
      aspect-ratio: 1;
      margin: 0;
      display: grid;
      place-items: center;
      border: 1px solid #3c493e;
      border-radius: 50%;
      padding: 8px;
      background: radial-gradient(circle at 45% 38%, #273229 0, #151b16 72%, #0e130f 100%);
      color: #d4ddd5;
      overflow: hidden;
      box-shadow: inset 0 0 40px #0008, 0 10px 25px #0008;
      cursor: pointer;
      user-select: none;
      touch-action: none;
      transition: transform .12s, color .12s, border-color .12s;
    }

    #ptt:active, #ptt.active { transform: scale(.96); color: var(--green); border-color: var(--green); box-shadow: inset 0 0 35px #91f29f16, 0 0 22px #91f29f20; }
    .ptt-row:has(#ptt.active)::after { content: ""; position: absolute; inset: -8px; border: 1px solid var(--green); border-radius: 50%; animation: pulse 1s infinite; pointer-events: none; }
    #ptt:disabled { opacity: .45; cursor: wait; }
    @keyframes pulse { 50% { inset: -14px; opacity: .15; } }

    .hint { color: var(--muted); font-size: .68rem; line-height: 1.6; text-align: center; }
    .hint strong { color: #b8c2ba; }



    @media (max-width: 760px) {
      body { padding: 0; }
      .shell { width: 100%; height: 100dvh; min-height: 0; border: 0; }
      .workspace { display: flex; flex-direction: column; min-height: 0; }
      .comms { min-height: 0; flex: 1 1 auto; }
      #log { min-height: 0; padding: 14px 16px; }
      aside {
        order: -1;
        flex: 0 0 auto;
        padding: 10px 16px 12px;
        border: 0;
        border-bottom: 1px solid var(--green-dim);
        background:
          linear-gradient(90deg, transparent, #91f29f0a 50%, transparent),
          #0c120e;
        box-shadow: 0 12px 30px #0007;
      }
      aside .section-label { text-align: center; }
      .voice-control { width: min(100%, 420px); margin: 0 auto 8px; }
      .voice-control .section-label { display: block; }
      .voice-control select { padding-top: 8px; padding-bottom: 8px; }
      .radio-status { min-height: 20px; margin-bottom: 5px; color: #a7b3a9; }
      .ptt-row {
        --ptt-size: min(36vw, 138px);
        margin-bottom: 8px;
      }
      #ptt {
        border-width: 2px;
        border-color: var(--green-dim);
        box-shadow: inset 0 0 40px #0008, 0 8px 30px #000b, 0 0 0 7px #101711;
      }
      .hint { font-size: .6rem; line-height: 1.35; }
      .message { max-width: 92%; }
      header { padding: 10px 14px; }
      .insignia { width: 38px; }
      h1 { font-size: clamp(1.55rem, 7vw, 2rem); }
      .transcript { padding: 10px 14px 12px; }
      #heard { min-height: 18px; margin-bottom: 7px; font-size: .75rem; }
      input { padding: 9px 11px; font-size: .78rem; }
      .send { padding: 0 12px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">
        <div class="insignia"><span>H</span></div>
        <div>
          <div class="kicker">GBTF TOC</div>
          <h1>HAVOC</h1>
        </div>
      </div>
      <div class="connection"><span>ZULU-4 // ENCR</span><span class="dot"></span></div>
    </header>

    <div class="workspace">
      <section class="comms">
        <div id="log" aria-live="polite">
          <div class="empty" id="empty"><strong>RADIO NET IS CLEAR</strong>Hold push-to-talk and deliver your SITREP.</div>
        </div>
        <div class="transcript">
          <div id="heard">Awaiting transmission…</div>
          <div class="manual-row">
            <input id="manual" maxlength="4000" autocomplete="off" placeholder="Or type a radio message…" aria-label="Radio message">
            <button class="send" id="send" type="button">TRANSMIT</button>
          </div>
        </div>
      </section>

      <aside>
        <div class="voice-control">
          <label class="section-label" for="voice">HAVOC voice</label>
          <select id="voice" aria-label="HAVOC text-to-speech voice">
            <option>Loading en-US voices…</option>
          </select>
        </div>
        <div class="section-label">Radio control</div>
        <div class="radio-status" id="status">Ready to receive</div>
        <div class="ptt-row">
          <button id="ptt" type="button" aria-label="Hold the radio to push to talk">
            <img class="radio-visual" src="radio.jpg" alt="">
          </button>
        </div>
        <div class="hint"><strong>Press and hold</strong> while speaking.<br>Release to transmit to HAVOC.</div>
      </aside>
    </div>
  </main>

  <script>
    const REMOTE_API = 'https://unvascular-malachi-isolatedly.ngrok-free.dev';
    const ON_GITHUB_PAGES = location.hostname === 'github.io' || location.hostname.endsWith('.github.io');
    const API_BASE = ON_GITHUB_PAGES ? REMOTE_API : location.origin;
    const sessionToken = sessionStorage.getItem('havoc-session');
    const IS_ANDROID = /Android/i.test(navigator.userAgent);
    if (ON_GITHUB_PAGES && !sessionToken) location.replace('login.html');

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const ptt = document.querySelector('#ptt');
    const statusEl = document.querySelector('#status');
    const voiceSelect = document.querySelector('#voice');
    const heard = document.querySelector('#heard');
    const log = document.querySelector('#log');
    const manual = document.querySelector('#manual');
    const send = document.querySelector('#send');
    const empty = document.querySelector('#empty');
    const history = [];
    const radioKeySound = new Audio('keyradio.mp3');
    radioKeySound.preload = 'auto';
    radioKeySound.volume = 0.25;
    let radioKeyBuffer = null;
    let radioAudioContext = null;
    let radioNoise = null;
    let radioNoiseBuffer = null;

    // Pre-fetch the audio as an ArrayBuffer as early as possible for Web Audio API
    const keyradioFetchPromise = fetch('keyradio.mp3')
      .then(r => r.arrayBuffer())
      .catch(err => console.error('Failed to fetch keyradio.mp3', err));

    function forceUnlockAudio() {
      const context = unlockRadioAudio();
      if (context && context.state === 'suspended') {
        context.resume().catch(() => {});
      }
      try {
        radioKeySound.play().then(() => {
          radioKeySound.pause();
          radioKeySound.currentTime = 0;
        }).catch(() => {});
      } catch (_) {}
    }
    window.addEventListener('click', forceUnlockAudio, { capture: true, once: true });
    window.addEventListener('touchstart', forceUnlockAudio, { capture: true, once: true });
    let recognition = null;
    let holding = false;
    let busy = false;
    let finalText = '';
    let interimText = '';
    let preferredVoice = null;

    function loadPreferredVoice() {
      if (!window.speechSynthesis) return;
      const voices = speechSynthesis.getVoices().filter(voice =>
        voice.lang.replace('_', '-').toLowerCase() === 'en-us'
      );
      if (!voices.length) {
        voiceSelect.innerHTML = '<option value="">Default en-US voice</option>';
        preferredVoice = null;
        return;
      }

      const savedVoice = localStorage.getItem('havoc-voice');
      preferredVoice = voices.find(voice => voice.name === savedVoice)
        || voices.find(voice => voice.name === 'Microsoft Steffan Online (Natural) - English (United States)')
        || voices.find(voice => voice.name.includes('Microsoft Steffan Online'))
        || voices[0];

      const selectedName = preferredVoice.name;
      voiceSelect.replaceChildren(...voices.map(voice => {
        const option = document.createElement('option');
        option.value = voice.name;
        option.textContent = `${voice.name}${voice.localService ? ' — device' : ' — online'}`;
        option.selected = voice.name === selectedName;
        return option;
      }));
    }

    loadPreferredVoice();
    speechSynthesis?.addEventListener?.('voiceschanged', loadPreferredVoice);
    voiceSelect.addEventListener('change', () => {
      preferredVoice = speechSynthesis.getVoices().find(voice =>
        voice.name === voiceSelect.value
        && voice.lang.replace('_', '-').toLowerCase() === 'en-us'
      ) || null;
      if (preferredVoice) localStorage.setItem('havoc-voice', preferredVoice.name);
    });

    async function playRadioKey(waitForEnd = false) {
      const context = unlockRadioAudio();
      if (context && radioKeyBuffer) {
        try {
          const source = context.createBufferSource();
          source.buffer = radioKeyBuffer;
          const gain = context.createGain();
          gain.gain.value = 0.25;
          source.connect(gain).connect(context.destination);
          
          return new Promise(resolve => {
            if (waitForEnd) {
              source.onended = resolve;
              setTimeout(resolve, (radioKeyBuffer.duration * 1000) + 100);
            } else {
              resolve();
            }
            source.start(0);
          });
        } catch (e) {
          console.error('Web Audio playRadioKey error, falling back', e);
        }
      }

      try {
        radioKeySound.pause();
        radioKeySound.currentTime = 0;
        if (!waitForEnd) {
          await radioKeySound.play();
          return;
        }

        await new Promise(resolve => {
          let finished = false;
          const finish = () => {
            if (finished) return;
            finished = true;
            clearTimeout(timeout);
            radioKeySound.removeEventListener('ended', finish);
            radioKeySound.removeEventListener('error', finish);
            resolve();
          };
          const timeout = setTimeout(finish, 3000);
          radioKeySound.addEventListener('ended', finish, {once: true});
          radioKeySound.addEventListener('error', finish, {once: true});
          radioKeySound.play().catch(finish);
        });
      } catch (_) {
        // Speech should still work if a browser blocks or cannot decode the cue.
      }
    }

    function unlockRadioAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      if (!radioAudioContext) {
        radioAudioContext = new AudioContextClass();
        keyradioFetchPromise.then(arrayBuffer => {
          if (arrayBuffer && radioAudioContext) {
            radioAudioContext.decodeAudioData(arrayBuffer.slice(0))
              .then(buffer => { radioKeyBuffer = buffer; })
              .catch(err => console.error('decodeAudioData error', err));
          }
        });
      }
      if (radioAudioContext.state === 'suspended') radioAudioContext.resume().catch(() => {});
      return radioAudioContext;
    }

    function startRadioNoise() {
      stopRadioNoise();
      const context = unlockRadioAudio();
      if (!context) return;

      if (!radioNoiseBuffer) {
        radioNoiseBuffer = context.createBuffer(1, context.sampleRate * 2, context.sampleRate);
        const samples = radioNoiseBuffer.getChannelData(0);
        for (let i = 0; i < samples.length; i++) samples[i] = Math.random() * 2 - 1;
      }

      const source = context.createBufferSource();
      const highpass = context.createBiquadFilter();
      const lowpass = context.createBiquadFilter();
      const gain = context.createGain();
      source.buffer = radioNoiseBuffer;
      source.loop = true;
      highpass.type = 'highpass';
      highpass.frequency.value = 450;
      lowpass.type = 'lowpass';
      lowpass.frequency.value = 3200;
      gain.gain.setValueAtTime(0.0001, context.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.03, context.currentTime + 0.04);
      source.connect(highpass).connect(lowpass).connect(gain).connect(context.destination);
      source.start();
      radioNoise = {source, gain, context};
    }

    function stopRadioNoise() {
      if (!radioNoise) return;
      const {source, gain, context} = radioNoise;
      radioNoise = null;
      try {
        gain.gain.cancelScheduledValues(context.currentTime);
        gain.gain.setValueAtTime(Math.max(gain.gain.value, 0.0001), context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.06);
        source.stop(context.currentTime + 0.07);
      } catch (_) {}
    }

    function setStatus(text, type = '') {
      statusEl.textContent = text;
      statusEl.style.color = type === 'error' ? 'var(--red)' : type === 'active' ? 'var(--green)' : '';
    }

    function addMessage(role, text) {
      empty?.remove();
      const item = document.createElement('article');
      item.className = `message ${role === 'user' ? 'operator' : 'havoc'}`;
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = role === 'user' ? 'FIELD TRANSMISSION' : 'HAVOC // TOC COMMAND';
      const body = document.createElement('div');
      body.className = 'message-body';
      body.textContent = text;
      item.append(meta, body);
      log.append(item);
      log.scrollTop = log.scrollHeight;
    }

    async function speakReply(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      await playRadioKey(true);
      const utterance = new SpeechSynthesisUtterance(text);
      loadPreferredVoice();
      if (preferredVoice) utterance.voice = preferredVoice;
      utterance.lang = preferredVoice?.lang || 'en-US';
      utterance.rate = 1.25;
      utterance.pitch = 0.82;
      utterance.volume = 0.92;
      utterance.onstart = () => {
        startRadioNoise();
        setStatus('HAVOC transmitting', 'active');
      };
      utterance.onend = () => {
        stopRadioNoise();
        setStatus('Ready to receive');
      };
      utterance.onerror = () => {
        stopRadioNoise();
        setStatus('Response received');
      };
      speechSynthesis.speak(utterance);
    }

    async function transmit(rawText) {
      const message = rawText.trim();
      if (!message || busy) return;
      unlockRadioAudio();
      busy = true;
      ptt.disabled = true;
      send.disabled = true;
      heard.textContent = `TX: ${message}`;
      heard.classList.remove('listening');
      addMessage('user', message);
      setStatus('Awaiting HAVOC…', 'active');

      try {
        const response = await fetch(`${API_BASE}/api/transmit`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': '1',
            ...(sessionToken ? {'Authorization': `Bearer ${sessionToken}`} : {})
          },
          body: JSON.stringify({message, history})
        });
        const data = await response.json().catch(() => ({}));
        if (response.status === 401) {
          sessionStorage.removeItem('havoc-session');
          location.replace('login.html');
          return;
        }
        if (!response.ok) {
          const wrongServer = response.status === 501
            ? 'An old server is running. Close it and relaunch run.bat.'
            : `Server error ${response.status}`;
          throw new Error(data.error || wrongServer);
        }
        addMessage('model', data.reply);
        history.push({role: 'user', text: message}, {role: 'model', text: data.reply});
        if (history.length > 12) history.splice(0, history.length - 12);
        await speakReply(data.reply);
      } catch (error) {
        setStatus('Transmission failed', 'error');
        heard.textContent = error.message;
      } finally {
        busy = false;
        ptt.disabled = false;
        send.disabled = false;
      }
    }

    if (Recognition) {
      recognition = new Recognition();
      recognition.lang = 'en-US';
      recognition.continuous = !IS_ANDROID;
      recognition.interimResults = true;

      recognition.onresult = (event) => {
        // Mobile Chromium may revise earlier interim words several times. Rebuild
        // the current phrase and collapse progressive prefix duplicates.
        const phrases = [];
        for (let i = 0; i < event.results.length; i++) {
          const text = event.results[i][0].transcript.trim();
          if (!text) continue;
          const current = {text, final: event.results[i].isFinal};
          const previous = phrases.at(-1);
          if (!previous) {
            phrases.push(current);
            continue;
          }
          const priorWords = previous.text.toLowerCase();
          const currentWords = current.text.toLowerCase();
          if (currentWords.startsWith(priorWords)) phrases[phrases.length - 1] = current;
          else if (!priorWords.startsWith(currentWords)) phrases.push(current);
        }
        finalText = phrases.filter(phrase => phrase.final).map(phrase => phrase.text).join(' ');
        interimText = phrases.filter(phrase => !phrase.final).map(phrase => phrase.text).join(' ');
      };

      recognition.onerror = (event) => {
        if (event.error === 'aborted' || event.error === 'no-speech') return;
        holding = false;
        ptt.classList.remove('active');
        setStatus(event.error === 'not-allowed' ? 'Microphone permission denied' : `Mic error: ${event.error}`, 'error');
      };

      recognition.onend = () => {
        // Do not restart here. Mobile recognition often returns the same phrase
        // after a restart, producing duplicated and progressively revised text.
        if (holding && (finalText || interimText)) {
          setStatus('Speech captured — release to transmit', 'active');
        }
      };
    } else {
      ptt.disabled = true;
      setStatus('Voice input needs Chrome or Edge', 'error');
      heard.textContent = 'Voice recognition is unavailable. Use the text field below.';
    }

    async function startTalking(event) {
      event.preventDefault();
      if (!recognition || busy || holding) return;
      unlockRadioAudio();
      speechSynthesis?.cancel();
      holding = true;
      finalText = '';
      interimText = '';
      ptt.classList.add('active');
      ptt.setPointerCapture?.(event.pointerId);
      heard.textContent = 'Keying radio…';
      heard.classList.add('listening');
      setStatus('Opening channel', 'active');
      playRadioKey(false);
      if (!holding || busy) return;
      heard.textContent = 'Listening…';
      setStatus('Receiving transmission', 'active');
      try { recognition.start(); }
      catch (_) { setStatus('Microphone is already active', 'error'); }
    }

    function stopTalking(event) {
      if (!holding) return;
      event?.preventDefault();
      holding = false;
      ptt.classList.remove('active');
      try { recognition.stop(); } catch (_) {}
      const message = `${finalText} ${interimText}`.trim();
      if (message) transmit(message);
      else {
        heard.textContent = 'No speech detected. Hold the button and try again.';
        heard.classList.remove('listening');
        setStatus('Ready to receive');
      }
    }

    ptt.addEventListener('pointerdown', startTalking);
    ptt.addEventListener('pointerup', stopTalking);
    ptt.addEventListener('pointercancel', stopTalking);
    ptt.addEventListener('contextmenu', event => event.preventDefault());
    send.addEventListener('click', () => { const value = manual.value; manual.value = ''; transmit(value); });
    manual.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); send.click(); }
    });
    window.addEventListener('beforeunload', () => {
      stopRadioNoise();
      speechSynthesis?.cancel();
    });
  </script>
</body>
</html>
